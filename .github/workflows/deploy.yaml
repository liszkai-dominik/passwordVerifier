name: Deploy App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/liszkai-dominik/password-verifier:latest .

      - name: Push image
        run: |
          docker push ghcr.io/liszkai-dominik/password-verifier:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          printf "%s" "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # (opcionális debug, ha még mindig nem megy)
      # - name: Debug kubeconfig
      #   run: cat ~/.kube/config

      - name: Deploy
        run: |
          kubectl get nodes
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout restart deployment password-verifier